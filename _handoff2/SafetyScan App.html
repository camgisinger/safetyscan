<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="concept-chrome.jsx"></script>

<script type="text/babel" src="app-screens-3.jsx"></script>
<script type="text/babel" src="app-canvas.jsx"></script>

<script>
// Durable artboard auto-fit: grow each card to its phone content and re-assert
// if React re-applies the prop height on re-render (pan/zoom/state fetch).
function ssFit(card) {
  var inner = card.firstElementChild;
  if (!inner || !inner.querySelector || !inner.querySelector('.phone')) return;
  var need = inner.scrollHeight;
  var cur = parseFloat(card.style.height) || 0;
  if (need > cur + 1) card.style.height = need + 'px';
}
function ssObserve() {
  document.querySelectorAll('.dc-card').forEach(function (card) {
    if (card.__ssObs) return;
    var inner = card.firstElementChild;
    if (!inner || !inner.querySelector || !inner.querySelector('.phone')) return;
    card.__ssObs = true;
    ssFit(card);
    try {
      new ResizeObserver(function () { ssFit(card); }).observe(inner);
      new MutationObserver(function () { ssFit(card); })
        .observe(card, { attributes: true, attributeFilter: ['style'] });
    } catch (e) {}
  });
}
window.addEventListener('load', function () {
  [200, 700, 1500, 3000].forEach(function (t) { setTimeout(ssObserve, t); });
});
if (document.fonts && document.fonts.ready) document.fonts.ready.then(function () { setTimeout(ssObserve, 100); });
</script>
</body>
</html>
